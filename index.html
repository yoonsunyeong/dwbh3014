<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>근로감독관 업무 스케줄 관리</title>
  <style>
    :root {
      --bg: #f3f7ff;
      --card: #ffffff;
      --line: #c7d5ef;
      --text: #1a2a45;
      --muted: #5f6d82;
      --primary: #1b63d0;
      --primary-soft: #dce8ff;
      --accent: #ff8a00;
      --shadow: 0 12px 28px rgba(24, 52, 98, 0.12);
      --red: #ef4444;
      --orange: #f97316;
      --yellow: #facc15;
      --green: #22c55e;
      --sky: #0ea5e9;
      --blue: #3b82f6;
      --purple: #a855f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 15%, #d6e7ff 0%, #d6e7ff 20%, transparent 42%),
        radial-gradient(circle at 88% 22%, #ffe5c6 0%, #ffe5c6 16%, transparent 36%),
        linear-gradient(160deg, #edf4ff 0%, #f7fbff 48%, #f8fbff 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1260px;
      margin: 0 auto;
      padding: 24px 14px 40px;
      animation: fadeUp 0.45s ease-out;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 6px 0 16px;
      color: var(--muted);
      font-size: 15px;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid #d3e0f7;
      border-radius: 14px;
      backdrop-filter: blur(8px);
      margin-bottom: 14px;
    }

    .tabs button {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .tabs button.active {
      background: linear-gradient(135deg, #2373e7, #1b63d0);
      color: #fff;
      box-shadow: 0 6px 14px rgba(27, 99, 208, 0.24);
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .month-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .month-nav {
      display: flex;
      gap: 6px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      padding: 8px 11px;
      cursor: pointer;
    }

    .btn.soft {
      background: var(--primary-soft);
      color: #20427f;
    }

    .calendar-week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(100px, 1fr));
      gap: 6px;
    }

    .day {
      border: 1px solid #d8e2f7;
      border-radius: 12px;
      min-height: 122px;
      padding: 8px 8px 6px;
      background: #fff;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      overflow: hidden;
    }

    .day:hover {
      border-color: #98b9ec;
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(48, 86, 147, 0.12);
    }

    .day.dim {
      background: #f7f9ff;
      color: #90a0b9;
    }

    .day.active {
      border-color: #2373e7;
      box-shadow: inset 0 0 0 1px #2373e7;
    }

    .date-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      flex-shrink: 0;
    }

    .event-mini {
      display: flex;
      align-items: center;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .event-mini strong {
      margin-right: 4px;
      font-size: 11px;
      color: #3f567e;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .field {
      margin-bottom: 9px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #cfdbf0;
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }

    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #d5e0f5;
      border-radius: 999px;
      padding: 5px 9px;
      background: #f8fbff;
      font-size: 12px;
      font-weight: 700;
    }

    .circle-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 4px;
    }

    .color-option {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .color-option.active {
      border-color: #1d3f7b;
      transform: scale(1.08);
    }

    .day-events {
      margin-top: 10px;
      border-top: 1px dashed #d6e2f4;
      padding-top: 8px;
      max-height: 150px;
      overflow: auto;
    }

    .event-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px dashed #e3ebfb;
      font-size: 13px;
    }

    .event-row:last-child {
      border-bottom: 0;
    }

    .event-main {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .event-main b {
      font-size: 12px;
      color: #3d567d;
    }

    .event-main span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .danger {
      border: 0;
      background: #fee2e2;
      color: #a61b1b;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      padding: 5px 8px;
    }

    .week-page { display: none; }
    .week-page.active { display: block; animation: fadeUp 0.35s ease-out; }
    .month-page.active { display: block; }
    .month-page { display: none; }

    .week-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .week-col {
      border: 1px solid #d5e1f6;
      border-radius: 12px;
      min-height: 190px;
      background: #fff;
      padding: 8px;
    }

    .week-col h4 {
      margin: 0 0 7px;
      font-size: 13px;
      color: #405b87;
    }

    .week-event {
      border: 1px solid #e0e9fa;
      border-left: 4px solid #7da4e9;
      border-radius: 8px;
      padding: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      background: #f8fbff;
    }

    .highlight-box {
      border: 1px solid #d4e1f6;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #fbfdff, #f4f8ff);
    }

    .highlight-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      margin: 6px 0;
    }

    .todo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .todo-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      max-height: 420px;
    }

    .todo-item.done input[type="text"] {
      text-decoration: line-through;
      color: #6b7280;
    }

    .week-col.active {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12);
    }

    .todo-item {
      display: flex;
      gap: 7px;
      align-items: center;
      border: 1px solid #dbe5f7;
      border-radius: 10px;
      padding: 7px;
      background: #fff;
    }

    .todo-item input[type="text"] {
      border: 0;
      border-bottom: 1px solid #d5e1f5;
      border-radius: 0;
      padding: 6px 3px;
    }

    .todo-item input[type="text"]:focus {
      outline: none;
      border-bottom-color: #2b72dd;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }

    .memo {
      min-height: 104px;
      resize: vertical;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: repeat(7, minmax(82px, 1fr)); }
      .week-grid { grid-template-columns: repeat(4, minmax(130px, 1fr)); }
      .todo-grid { grid-template-columns: repeat(3, minmax(160px, 1fr)); }
    }

    @media (max-width: 760px) {
      .wrap { padding: 14px 10px 24px; }
      h1 { font-size: 24px; }
      .tabs { display: flex; width: 100%; }
      .tabs button { flex: 1; font-size: 14px; padding: 9px 8px; }
      .calendar-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .calendar-week { display: none; }
      .week-grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .todo-grid { grid-template-columns: 1fr; }
    }
      .calendar-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .calendar-week { display: none; }
      .week-grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .todo-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>근로감독관 업무 스케줄 관리</h1>
    <p class="sub">월간 캘린더에서 날짜를 누르면 바로 일정 등록, 주간 탭에서 중요행사 + 상세 업무 관리</p>

    <div class="tabs">
      <button type="button" class="active" data-tab="month">월간 캘린더</button>
      <button type="button" data-tab="week">주간 스케줄</button>
    </div>

    <section class="month-page active" id="month-page">
      <div class="layout">
        <div class="card">
          <div class="month-head">
            <h2 id="month-title">2026년 4월</h2>
            <div class="month-nav">
              <button class="btn soft" type="button" id="prev-month">이전</button>
              <button class="btn soft" type="button" id="today-month">오늘</button>
              <button class="btn soft" type="button" id="next-month">다음</button>
            </div>
          </div>
          <div class="calendar-week">
            <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <aside class="card">
          <h2>일정 등록</h2>
          <div class="field">
            <label for="selected-date">선택 날짜</label>
            <input id="selected-date" type="date" />
          </div>
          <div class="field">
            <label for="event-time">시간</label>
            <input id="event-time" type="time" />
          </div>
          <div class="field">
            <label for="event-category">카테고리</label>
            <select id="event-category"></select>
          </div>
          <div class="field">
            <label for="event-title">할 일</label>
            <input id="event-title" type="text" placeholder="예: 출장 OO사업장 16:00 점검" />
          </div>
          <div class="field inline">
            <input id="event-important" type="checkbox" style="width:16px;height:16px;" />
            <label for="event-important" style="margin:0;">중요 행사로 표시</label>
          </div>
          <button class="btn" type="button" id="add-event">일정 추가</button>

          <div class="day-events" id="day-events"></div>

          <div style="margin-top:12px;border-top:1px solid #dbe5f7;padding-top:10px;">
            <h2 style="margin-bottom:6px;">카테고리 만들기</h2>
            <div class="field">
              <label for="category-name">카테고리명</label>
              <input id="category-name" type="text" placeholder="예: 출장, 점검, 민원" />
            </div>
            <div class="field">
              <label>동그라미 색상 (무지개)</label>
              <div class="circle-picker" id="color-picker"></div>
            </div>
            <button class="btn soft" type="button" id="add-category">카테고리 저장</button>
            <div class="chip-list" id="category-chip-list"></div>
          </div>
        </aside>
      </div>
    </section>

    <section class="week-page" id="week-page">
      <div class="card">
        <div class="week-head">
          <h2 id="week-title">주간 스케줄</h2>
          <div class="month-nav">
            <button class="btn soft" type="button" id="prev-week">이전 주</button>
            <button class="btn soft" type="button" id="this-week">이번 주</button>
            <button class="btn soft" type="button" id="next-week">다음 주</button>
          </div>
        </div>

        <div class="highlight-box">
          <h2 style="margin-bottom:6px;">상단 중요 행사 (월간 캘린더 연동)</h2>
          <div id="important-list"></div>
        </div>

        <div class="week-grid" id="week-grid"></div>

        <div class="card" style="box-shadow:none;padding:12px;border-radius:12px;">
          <h2>하단 To-Do 리스트 (주간 캘린더와 독립)</h2>
          <div class="todo-grid" id="todo-grid"></div>
          <label for="week-memo">메모</label>
          <textarea id="week-memo" class="memo" placeholder="자유 메모"></textarea>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "labor_inspector_schedule_v1";
    const COLORS = ["#ef4444", "#f97316", "#facc15", "#22c55e", "#0ea5e9", "#3b82f6", "#a855f7"];
    const WEEK_DAYS = ["일", "월", "화", "수", "목", "금", "토"];

    const state = {
      activeTab: "month",
      currentMonth: firstDayOfMonth(new Date()),
      selectedDate: toYmd(new Date()),
      currentWeekStart: startOfWeek(new Date()),
      selectedWeekDay: toYmd(startOfWeek(new Date())),
      selectedColor: COLORS[0],
      categories: [],
      events: [],
      weeklyTodo: {},
      weeklyMemo: ""
    };

    function init() {
      loadState();
      ensureDefaults();
      bindTabEvents();
      bindCalendarEvents();
      bindCategoryEvents();
      bindEventEvents();
      bindWeekEvents();
      renderAll();
    }

    function ensureDefaults() {
      if (state.categories.length === 0) {
        state.categories = [
          { id: uid(), name: "출장", color: "#a855f7" },
          { id: uid(), name: "현장점검", color: "#3b82f6" },
          { id: uid(), name: "민원처리", color: "#22c55e" }
        ];
      }
      if (Array.isArray(state.weeklyTodo) && state.weeklyTodo.length === 10) {
        const monday = toYmd(startOfWeek(new Date(state.selectedDate)));
        state.weeklyTodo = weekDates(startOfWeek(new Date(state.selectedDate))).reduce((acc, ymd) => {
          acc[ymd] = ymd === monday ? state.weeklyTodo.map((item) => ({ ...item })) : Array.from({ length: 10 }, () => ({ done: false, text: "" }));
          return acc;
        }, {});
      } else if (!state.weeklyTodo || typeof state.weeklyTodo !== "object" || Array.isArray(state.weeklyTodo)) {
        state.weeklyTodo = {};
      }
      ensureWeeklyTodos(state.currentWeekStart);
      if (!state.selectedWeekDay || !state.weeklyTodo[state.selectedWeekDay]) {
        state.selectedWeekDay = toYmd(state.currentWeekStart);
      }
    }

    function weekDates(weekStart) {
      return Array.from({ length: 7 }, (_, i) => toYmd(addDay(weekStart, i)));
    }

    function ensureWeeklyTodos(weekStart) {
      weekDates(weekStart).forEach((ymd) => {
        if (!Array.isArray(state.weeklyTodo[ymd]) || state.weeklyTodo[ymd].length !== 10) {
          state.weeklyTodo[ymd] = Array.from({ length: 10 }, () => ({ done: false, text: "" }));
        }
      });
      if (!state.weeklyTodo[state.selectedWeekDay]) {
        state.selectedWeekDay = toYmd(weekStart);
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        state.categories = parsed.categories || [];
        state.events = parsed.events || [];
        state.weeklyTodo = parsed.weeklyTodo || [];
        state.weeklyMemo = parsed.weeklyMemo || "";
      } catch (error) {
        console.error("저장 데이터 로딩 실패", error);
      }
    }

    function saveState() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
          categories: state.categories,
          events: state.events,
          weeklyTodo: state.weeklyTodo,
          weeklyMemo: state.weeklyMemo
        })
      );
    }

    function bindTabEvents() {
      document.querySelectorAll("[data-tab]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.activeTab = btn.dataset.tab;
          if (state.activeTab === "week") {
            state.currentWeekStart = startOfWeek(new Date(state.selectedDate));
          }
          renderTabs();
          renderWeekView();
        });
      });
    }

    function bindCalendarEvents() {
      document.getElementById("prev-month").addEventListener("click", () => {
        state.currentMonth = addMonth(state.currentMonth, -1);
        renderCalendar();
      });
      document.getElementById("next-month").addEventListener("click", () => {
        state.currentMonth = addMonth(state.currentMonth, 1);
        renderCalendar();
      });
      document.getElementById("today-month").addEventListener("click", () => {
        const now = new Date();
        state.currentMonth = firstDayOfMonth(now);
        state.selectedDate = toYmd(now);
        renderAll();
      });
    }

    function bindCategoryEvents() {
      const picker = document.getElementById("color-picker");
      COLORS.forEach((color) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "color-option";
        btn.style.background = color;
        if (color === state.selectedColor) btn.classList.add("active");
        btn.addEventListener("click", () => {
          state.selectedColor = color;
          document.querySelectorAll(".color-option").forEach((item) => item.classList.remove("active"));
          btn.classList.add("active");
        });
        picker.appendChild(btn);
      });

      document.getElementById("add-category").addEventListener("click", () => {
        const nameInput = document.getElementById("category-name");
        const name = nameInput.value.trim();
        if (!name) return;
        state.categories.push({ id: uid(), name, color: state.selectedColor });
        nameInput.value = "";
        saveState();
        renderCategoryArea();
      });
    }

    function bindEventEvents() {
      document.getElementById("selected-date").addEventListener("change", (e) => {
        state.selectedDate = e.target.value || state.selectedDate;
        state.currentMonth = firstDayOfMonth(new Date(state.selectedDate));
        renderAll();
      });

      document.getElementById("add-event").addEventListener("click", () => {
        const date = document.getElementById("selected-date").value;
        const time = document.getElementById("event-time").value || "";
        const categoryId = document.getElementById("event-category").value;
        const title = document.getElementById("event-title").value.trim();
        const important = document.getElementById("event-important").checked;
        if (!date || !title || !categoryId) return;
        state.events.push({ id: uid(), date, time, categoryId, title, important });
        document.getElementById("event-title").value = "";
        document.getElementById("event-time").value = "";
        document.getElementById("event-important").checked = false;
        saveState();
        renderAll();
      });
    }

    function bindWeekEvents() {
      document.getElementById("prev-week").addEventListener("click", () => {
        state.currentWeekStart = addDay(state.currentWeekStart, -7);
        renderWeekView();
      });
      document.getElementById("next-week").addEventListener("click", () => {
        state.currentWeekStart = addDay(state.currentWeekStart, 7);
        renderWeekView();
      });
      document.getElementById("this-week").addEventListener("click", () => {
        state.currentWeekStart = startOfWeek(new Date());
        renderWeekView();
      });
      document.getElementById("week-memo").addEventListener("input", (e) => {
        state.weeklyMemo = e.target.value;
        saveState();
      });
    }

    function renderAll() {
      renderTabs();
      renderCategoryArea();
      renderCalendar();
      renderDayEvents();
      renderWeekView();
    }

    function renderTabs() {
      document.querySelectorAll("[data-tab]").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === state.activeTab);
      });
      document.getElementById("month-page").classList.toggle("active", state.activeTab === "month");
      document.getElementById("week-page").classList.toggle("active", state.activeTab === "week");
    }

    function renderCategoryArea() {
      const select = document.getElementById("event-category");
      select.innerHTML = "";
      state.categories.forEach((c) => {
        const option = document.createElement("option");
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });

      const chips = document.getElementById("category-chip-list");
      chips.innerHTML = "";
      state.categories.forEach((c) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.innerHTML = `<span class="dot" style="background:${c.color};"></span>${escapeHtml(c.name)}`;
        chips.appendChild(chip);
      });
    }

    function renderCalendar() {
      const current = state.currentMonth;
      const year = current.getFullYear();
      const month = current.getMonth();
      document.getElementById("month-title").textContent = `${year}년 ${month + 1}월`;

      const grid = document.getElementById("calendar-grid");
      grid.innerHTML = "";

      const firstWeekday = new Date(year, month, 1).getDay();
      const startDate = new Date(year, month, 1 - firstWeekday);

      for (let i = 0; i < 42; i += 1) {
        const dayDate = addDay(startDate, i);
        const ymd = toYmd(dayDate);
        const dayEvents = getEventsByDate(ymd);
        const isCurrentMonth = dayDate.getMonth() === month;
        const isActive = ymd === state.selectedDate;
        const box = document.createElement("div");
        box.className = `day ${isCurrentMonth ? "" : "dim"} ${isActive ? "active" : ""}`.trim();
        box.innerHTML = `
          <div class="date-row">
            <span>${dayDate.getDate()}</span>
            ${dayEvents.some((event) => event.important) ? '<span style="color:#c34f00;font-size:11px;">중요</span>' : ""}
          </div>
        `;

        dayEvents.slice(0, 3).forEach((event) => {
          const cat = categoryById(event.categoryId);
          const eventNode = document.createElement("div");
          eventNode.className = "event-mini";
          eventNode.innerHTML = `
            <span class="dot" style="background:${cat ? cat.color : "#9ca3af"};"></span>
            <strong>${event.time || "--:--"}</strong>
            <span>${escapeHtml(event.title)}</span>
          `;
          box.appendChild(eventNode);
        });

        box.addEventListener("click", () => {
          state.selectedDate = ymd;
          state.currentMonth = firstDayOfMonth(dayDate);
          document.getElementById("selected-date").value = ymd;
          renderCalendar();
          renderDayEvents();
        });
        grid.appendChild(box);
      }

      document.getElementById("selected-date").value = state.selectedDate;
    }

    function renderDayEvents() {
      const target = document.getElementById("day-events");
      const dayEvents = getEventsByDate(state.selectedDate);
      if (dayEvents.length === 0) {
        target.innerHTML = `<div style="color:#6e7e99;font-size:13px;">선택한 날짜 일정이 없습니다.</div>`;
        return;
      }

      target.innerHTML = "";
      dayEvents.forEach((event) => {
        const cat = categoryById(event.categoryId);
        const row = document.createElement("div");
        row.className = "event-row";
        row.innerHTML = `
          <div class="event-main">
            <span class="dot" style="background:${cat ? cat.color : "#9ca3af"};"></span>
            <b>${event.time || "--:--"}</b>
            <span>${escapeHtml(event.title)}${event.important ? " (중요)" : ""}</span>
          </div>
          <button class="danger" type="button">삭제</button>
        `;
        row.querySelector("button").addEventListener("click", () => {
          state.events = state.events.filter((x) => x.id !== event.id);
          saveState();
          renderAll();
        });
        target.appendChild(row);
      });
    }

    function renderWeekView() {
      ensureWeeklyTodos(state.currentWeekStart);
      const start = state.currentWeekStart;
      const end = addDay(start, 6);
      document.getElementById("week-title").textContent = `주간 스케줄 (${toDisplayDate(start)} ~ ${toDisplayDate(end)})`;

      const important = state.events
        .filter((event) => event.important && inWeek(event.date, start))
        .sort(sortEvent);
      const importantList = document.getElementById("important-list");
      if (important.length === 0) {
        importantList.innerHTML = `<div style="color:#6e7e99;font-size:13px;">이번 주 중요 행사가 없습니다.</div>`;
      } else {
        importantList.innerHTML = "";
        important.forEach((event) => {
          const cat = categoryById(event.categoryId);
          const item = document.createElement("div");
          item.className = "highlight-item";
          item.innerHTML = `
            <span class="dot" style="background:${cat ? cat.color : "#9ca3af"};"></span>
            <span>${toDisplayDate(new Date(event.date))} ${event.time || "--:--"} | [${cat ? escapeHtml(cat.name) : "카테고리"}] ${escapeHtml(event.title)}</span>
          `;
          importantList.appendChild(item);
        });
      }

      ensureWeeklyTodos(state.currentWeekStart);
      const weekGrid = document.getElementById("week-grid");
      weekGrid.innerHTML = "";
      for (let i = 0; i < 7; i += 1) {
        const day = addDay(start, i);
        const ymd = toYmd(day);
        const events = getEventsByDate(ymd);
        const col = document.createElement("div");
        col.className = "week-col";
        if (state.selectedWeekDay === ymd) {
          col.classList.add("active");
        }
        col.innerHTML = `<h4>${WEEK_DAYS[day.getDay()]} ${day.getMonth() + 1}/${day.getDate()}</h4>`;

        if (events.length === 0) {
          col.innerHTML += `<div style="font-size:12px;color:#7787a2;">등록된 일정 없음</div>`;
        } else {
          events.sort(sortEvent).forEach((event) => {
            const cat = categoryById(event.categoryId);
            const card = document.createElement("div");
            card.className = "week-event";
            card.style.borderLeftColor = cat ? cat.color : "#9ca3af";
            card.innerHTML = `<b>${event.time || "--:--"}</b> ${escapeHtml(event.title)}`;
            col.appendChild(card);
          });
        }
        col.addEventListener("click", () => {
          state.selectedWeekDay = ymd;
          renderWeekView();
        });
        weekGrid.appendChild(col);
      }

      renderTodos();
      document.getElementById("week-memo").value = state.weeklyMemo || "";
    }

    function renderTodos() {
      const todoGrid = document.getElementById("todo-grid");
      todoGrid.innerHTML = "";
      const ymd = state.selectedWeekDay || toYmd(state.currentWeekStart);
      const day = new Date(ymd);
      const todos = state.weeklyTodo[ymd] || [];
      const header = document.createElement("div");
      header.style.marginBottom = "8px";
      header.innerHTML = `<h4 style="margin:0 0 6px; font-size:14px;">${WEEK_DAYS[day.getDay()]} ${day.getMonth() + 1}/${day.getDate()} 투두 리스트</h4>`;
      todoGrid.appendChild(header);

      const items = document.createElement("div");
      items.className = "todo-items";

      const todosWithIndex = todos.map((todo, index) => ({ ...todo, index }));
      todosWithIndex.sort((a, b) => Number(a.done) - Number(b.done));

      todosWithIndex.forEach((todo) => {
        const row = document.createElement("div");
        row.className = `todo-item${todo.done ? " done" : ""}`;
        row.innerHTML = `
          <input type="checkbox" ${todo.done ? "checked" : ""} />
          <input type="text" maxlength="80" placeholder="할 일 ${todo.index + 1}" value="${escapeAttr(todo.text)}" />
        `;
        const checkbox = row.querySelector("input[type='checkbox']");
        const text = row.querySelector("input[type='text']");
        checkbox.addEventListener("change", () => {
          state.weeklyTodo[ymd][todo.index].done = checkbox.checked;
          saveState();
          renderTodos();
        });
        text.addEventListener("input", () => {
          state.weeklyTodo[ymd][todo.index].text = text.value;
          saveState();
        });
        items.appendChild(row);
      });

      todoGrid.appendChild(items);
    }

    function getEventsByDate(ymd) {
      return state.events.filter((event) => event.date === ymd).sort(sortEvent);
    }

    function categoryById(id) {
      return state.categories.find((category) => category.id === id);
    }

    function sortEvent(a, b) {
      return (a.time || "99:99").localeCompare(b.time || "99:99");
    }

    function uid() {
      return `${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function firstDayOfMonth(d) {
      return new Date(d.getFullYear(), d.getMonth(), 1);
    }

    function addMonth(d, amount) {
      return new Date(d.getFullYear(), d.getMonth() + amount, 1);
    }

    function addDay(d, amount) {
      const next = new Date(d);
      next.setDate(next.getDate() + amount);
      return next;
    }

    function startOfWeek(d) {
      const copy = new Date(d);
      return addDay(new Date(copy.getFullYear(), copy.getMonth(), copy.getDate()), -copy.getDay());
    }

    function inWeek(ymd, weekStart) {
      const day = new Date(ymd);
      const start = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate());
      const end = addDay(start, 6);
      return day >= start && day <= end;
    }

    function toYmd(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function toDisplayDate(d) {
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "");
    }

    init();
  </script>
</body>
</html>
